name: Verify ReleaseSeal

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  contracts:
    name: Contract checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge fmt --check
      - run: forge build
      - run: forge test
